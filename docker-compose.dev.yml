services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - payload-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: portfolio:dev
    container_name: portfolio-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - DATABASE_URL=postgres://portfolio:portfolio@db:5432/portfolio
      - PAYLOAD_SECRET=dev-payload-secret-change-me
      - NEXT_REVALIDATE_SECRET=dev-revalidate-secret
      - PAYLOAD_WEBHOOK_SECRET=dev-webhook-secret
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind the source, but keep node_modules and .next inside the container
      # so the host OS doesn't clobber platform-specific binaries.
      - .:/app
      - node-modules:/app/node_modules
      - /app/.next
      - payload-media:/app/media
    command: sh -c "npm install && npm run dev"

volumes:
  payload-postgres-data:
  payload-media:
  node-modules:
