name: Release

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    name: Tag and release merged PR
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.merged == true }}

    timeout-minutes: 15
    env:
      BASE_VERSION: 1.2.1

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          base_tag="v${BASE_VERSION}"
          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="$base_tag"
          else
            latest_version="${latest_tag#v}"
            next_tag="$(node -e '
              const [base, latest] = process.argv.slice(1);

              function parse(version) {
                const parts = version.split(".").map(Number);
                if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part) || part < 0)) {
                  throw new Error(`Invalid semver version: ${version}`);
                }
                return parts;
              }

              function compare(a, b) {
                for (let index = 0; index < 3; index += 1) {
                  if (a[index] !== b[index]) return a[index] - b[index];
                }
                return 0;
              }

              const baseParts = parse(base);
              const latestParts = parse(latest);

              if (compare(latestParts, baseParts) < 0) {
                console.log(`v${base}`);
              } else {
                latestParts[2] += 1;
                console.log(`v${latestParts.join(".")}`);
              }
            ' "$BASE_VERSION" "$latest_version")"
          fi

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag $next_tag already exists; refusing to overwrite it." >&2
            exit 1
          fi

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "version=${next_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          printf '%s\n\n%s\n\n%s\n\n%s\n' \
            '## Changes' \
            "- Merged PR #${PR_NUMBER}: ${PR_TITLE}" \
            '## Commit' \
            "$MERGE_SHA" \
            > RELEASE_NOTES.md

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" "${{ github.event.pull_request.merge_commit_sha }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            --target "${{ github.event.pull_request.merge_commit_sha }}"
