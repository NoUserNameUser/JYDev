name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build and push production image
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      DEPLOY_REGISTRY: ${{ vars.DEPLOY_REGISTRY || 'ghcr' }}
      BUILD_PLATFORM: ${{ vars.DEPLOY_PLATFORM || 'linux/amd64' }}
      BUILD_NODE_OPTIONS: ${{ vars.BUILD_NODE_OPTIONS || '--max-old-space-size=2048' }}
    outputs:
      image_ref: ${{ steps.image-ref.outputs.value }}
    steps:
      - name: Validate build configuration
        shell: bash
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          [[ "$DEPLOY_REGISTRY" =~ ^(ghcr|ecr)$ ]] || {
            echo "DEPLOY_REGISTRY must be ghcr or ecr"
            exit 1
          }
          test -n "$NEXT_PUBLIC_SITE_URL" || {
            echo "NEXT_PUBLIC_SITE_URL repository variable is required"
            exit 1
          }
          if [[ "$DEPLOY_REGISTRY" == "ecr" ]]; then
            test -n "$AWS_REGION" || { echo "AWS_REGION repository variable is required"; exit 1; }
            test -n "$AWS_DEPLOY_ROLE_ARN" || { echo "AWS_DEPLOY_ROLE_ARN repository secret is required"; exit 1; }
          fi

      - name: Checkout deploy commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials with OIDC
        if: env.DEPLOY_REGISTRY == 'ecr'
        uses: aws-actions/configure-aws-credentials@v6.2.3
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve ECR repository
        if: env.DEPLOY_REGISTRY == 'ecr'
        id: ecr-repository
        shell: bash
        env:
          CONFIGURED_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          repository="${CONFIGURED_REPOSITORY:-${GITHUB_REPOSITORY#*/}}"
          repository="${repository,,}"
          [[ "$repository" =~ ^[a-z0-9]+([._/-][a-z0-9]+)*$ ]] || {
            echo "Invalid ECR repository name: $repository"
            exit 1
          }
          echo "name=$repository" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository exists
        if: env.DEPLOY_REGISTRY == 'ecr'
        shell: bash
        env:
          ECR_REPOSITORY: ${{ steps.ecr-repository.outputs.name }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository \
              --repository-name "$ECR_REPOSITORY" \
              --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Log in to ECR
        if: env.DEPLOY_REGISTRY == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to GHCR
        if: env.DEPLOY_REGISTRY == 'ghcr'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.ecr-repository.outputs.name }}
        run: |
          if [[ "$DEPLOY_REGISTRY" == "ecr" ]]; then
            image="$ECR_REGISTRY/$ECR_REPOSITORY"
          else
            image="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          echo "name=$image" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.BUILD_PLATFORM }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production-image
          cache-to: type=gha,mode=max,scope=production-image
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NODE_OPTIONS=${{ env.BUILD_NODE_OPTIONS }}
            NEXT_BUILD_MODE=compile
            NEXT_SKIP_BUILD_CHECKS=1
            NEXT_SKIP_BUILD_CMS=1

      - name: Pin deploy image by digest
        id: image-ref
        shell: bash
        run: echo "value=${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy prebuilt image to EC2
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_REGISTRY: ${{ vars.DEPLOY_REGISTRY || 'ghcr' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout deploy assets
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment configuration
        shell: bash
        run: |
          test -n "$IMAGE_REF" || { echo "Built image reference is missing"; exit 1; }
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST repository secret is required"; exit 1; }
          test -n "$DEPLOY_USER" || { echo "DEPLOY_USER repository secret is required"; exit 1; }
          test -n "$DEPLOY_SSH_KEY" || { echo "DEPLOY_SSH_KEY repository secret is required"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "DEPLOY_PATH repository variable is required"; exit 1; }

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload and run deployment
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" \
            docker-compose.yml scripts/deploy-prebuilt-image.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          printf -v remote_command 'bash %q %q %q %q %q' \
            "$DEPLOY_PATH/deploy-prebuilt-image.sh" \
            "$DEPLOY_PATH" "$IMAGE_REF" "$DEPLOY_REGISTRY" "$AWS_REGION"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" "$remote_command"
