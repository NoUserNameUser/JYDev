name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build and push production image
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BUILD_PLATFORM: ${{ vars.DEPLOY_PLATFORM || 'linux/amd64' }}
      BUILD_NODE_OPTIONS: ${{ vars.BUILD_NODE_OPTIONS || '--max-old-space-size=2048' }}
    outputs:
      image_ref: ${{ steps.image-ref.outputs.value }}
    steps:
      - name: Validate build configuration
        shell: bash
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          test -n "$NEXT_PUBLIC_SITE_URL" || {
            echo "NEXT_PUBLIC_SITE_URL repository variable is required"
            exit 1
          }

      - name: Checkout deploy commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=$image" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=long
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.BUILD_PLATFORM }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production-image
          cache-to: type=gha,mode=max,scope=production-image
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NODE_OPTIONS=${{ env.BUILD_NODE_OPTIONS }}
            NEXT_BUILD_MODE=compile
            NEXT_SKIP_BUILD_CHECKS=1
            NEXT_SKIP_BUILD_CMS=1

      - name: Pin deploy image by digest
        id: image-ref
        shell: bash
        run: echo "value=${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy prebuilt image with SSM
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || 'ec2-user' }}
    steps:
      - name: Checkout deploy assets
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate deployment configuration
        shell: bash
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail
          test -n "$IMAGE_REF" || { echo "Built image reference is missing"; exit 1; }
          test -n "$AWS_DEPLOY_ROLE_ARN" || { echo "AWS_DEPLOY_ROLE_ARN repository secret is required"; exit 1; }
          test -n "$AWS_REGION" || { echo "AWS_REGION repository variable is required"; exit 1; }
          test -n "$EC2_INSTANCE_ID" || { echo "EC2_INSTANCE_ID repository variable is required"; exit 1; }
          test -n "$DEPLOY_PATH" || { echo "DEPLOY_PATH repository variable is required"; exit 1; }
          [[ "$EC2_INSTANCE_ID" =~ ^i-[a-zA-Z0-9]+$ ]] || { echo "Invalid EC2_INSTANCE_ID"; exit 1; }
          [[ "$DEPLOY_PATH" == /* ]] || { echo "DEPLOY_PATH must be absolute"; exit 1; }
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]] || { echo "Invalid DEPLOY_USER"; exit 1; }

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.2.3
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare SSM command
        shell: bash
        run: >-
          scripts/prepare-ssm-command.sh "$DEPLOY_USER" "$DEPLOY_PATH" "$IMAGE_REF" ssm-parameters.json

      - name: Send deployment command
        id: ssm
        shell: bash
        run: |
          set -euo pipefail
          command_id="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${GITHUB_SHA:0:12}" \
            --timeout-seconds 600 \
            --parameters file://ssm-parameters.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "SSM command: $command_id"

      - name: Wait for deployment
        shell: bash
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 900))
          invocation=''

          while (( SECONDS < deadline )); do
            invocation="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --output json 2>/dev/null || true)"

            if [[ -n "$invocation" ]]; then
              status="$(jq -r '.Status' <<< "$invocation")"
              case "$status" in
                Success|Cancelled|Failed|TimedOut|Cancelling)
                  break
                  ;;
              esac
            fi

            sleep 5
          done

          test -n "$invocation" || { echo "SSM command did not start"; exit 1; }
          jq -r '"Status: \(.Status)\n\nSTDOUT:\n\(.StandardOutputContent)\n\nSTDERR:\n\(.StandardErrorContent)"' <<< "$invocation"
          test "$(jq -r '.Status' <<< "$invocation")" = Success
