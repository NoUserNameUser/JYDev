services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        DATABASE_URL: ${DATABASE_URL:-postgres://portfolio:portfolio@127.0.0.1:5432/portfolio}
        PAYLOAD_SECRET: ${PAYLOAD_SECRET:-docker-build-secret}
        NODE_OPTIONS: ${BUILD_NODE_OPTIONS:---max-old-space-size=768}
    image: portfolio:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PAYLOAD_DB_PUSH: ${PAYLOAD_DB_PUSH:-false}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?PAYLOAD_SECRET is required}
      NEXT_REVALIDATE_SECRET: ${NEXT_REVALIDATE_SECRET:?NEXT_REVALIDATE_SECRET is required}
      PAYLOAD_WEBHOOK_SECRET: ${PAYLOAD_WEBHOOK_SECRET:?PAYLOAD_WEBHOOK_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    volumes:
      - payload-media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  payload-media:
