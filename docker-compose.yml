services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    image: portfolio-strapi:latest
    container_name: portfolio-strapi
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=1337
      - APP_KEYS=${STRAPI_APP_KEYS:-change-me-1,change-me-2,change-me-3,change-me-4}
      - API_TOKEN_SALT=${STRAPI_API_TOKEN_SALT:-change-me-api-token-salt}
      - ADMIN_JWT_SECRET=${STRAPI_ADMIN_JWT_SECRET:-change-me-admin-jwt-secret}
      - TRANSFER_TOKEN_SALT=${STRAPI_TRANSFER_TOKEN_SALT:-change-me-transfer-token-salt}
      - JWT_SECRET=${STRAPI_JWT_SECRET:-change-me-jwt-secret}
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=portfolio
      - DATABASE_USERNAME=portfolio
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-portfolio}
      - DATABASE_SCHEMA=public
      - DATABASE_SSL=false
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - STRAPI_URL=http://strapi:1337
      - STRAPI_PUBLIC_URL=${STRAPI_PUBLIC_URL:-http://localhost:1337}
    depends_on:
      - strapi
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
