<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="Glass billing cards floating in golden-hour light, one tap paying a bill at 2 AM">
  <defs>
    <linearGradient id="p-sky" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#170a0e"/>
      <stop offset="0.5" stop-color="#2a1013"/>
      <stop offset="1" stop-color="#3d1418"/>
    </linearGradient>
    <radialGradient id="p-sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fcd34d" stop-opacity="0.85"/>
      <stop offset="0.28" stop-color="#fb923c" stop-opacity="0.4"/>
      <stop offset="0.62" stop-color="#f43f5e" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="p-glass" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#5b2a2c" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#2c1216" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="p-glassTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9c7" stop-opacity="0.75"/>
      <stop offset="0.18" stop-color="#ffe9c7" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffe9c7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="p-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="p-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fbbf24" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="p-vign" cx="0.5" cy="0.45" r="0.78">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d0507" stop-opacity="0.82"/>
    </radialGradient>
    <filter id="p-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p-soft" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="p-blur28" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <filter id="p-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#p-sky)"/>
  <circle cx="330" cy="640" r="560" fill="url(#p-sun)"/>

  <!-- light shafts -->
  <g transform="rotate(-24 330 640)">
    <rect x="180" y="120" width="70" height="720" fill="url(#p-beam)"/>
    <rect x="330" y="60" width="120" height="820" fill="url(#p-beam)" opacity="0.7"/>
    <rect x="560" y="120" width="52" height="760" fill="url(#p-beam)" opacity="0.5"/>
  </g>

  <!-- bokeh -->
  <g filter="url(#p-blur28)">
    <circle cx="1020" cy="180" r="46" fill="#fb7185" opacity="0.4"/>
    <circle cx="880" cy="120" r="26" fill="#fbbf24" opacity="0.45"/>
    <circle cx="140" cy="230" r="34" fill="#fbbf24" opacity="0.35"/>
    <circle cx="1090" cy="620" r="56" fill="#f43f5e" opacity="0.3"/>
    <circle cx="240" cy="120" r="20" fill="#fde68a" opacity="0.4"/>
  </g>
  <g fill="#ffe9c7">
    <circle cx="948" cy="248" r="3.4" opacity="0.7"/><circle cx="200" cy="180" r="2.6" opacity="0.6"/>
    <circle cx="1064" cy="420" r="2.8" opacity="0.5"/><circle cx="120" cy="480" r="2.4" opacity="0.45"/>
    <circle cx="700" cy="130" r="2.6" opacity="0.5"/>
  </g>

  <!-- back glass layers -->
  <g transform="rotate(-9 610 430)" opacity="0.5">
    <rect x="330" y="212" width="520" height="290" rx="30" fill="url(#p-glass)" stroke="#ffe9c7" stroke-opacity="0.16"/>
    <rect x="330" y="212" width="520" height="120" rx="30" fill="url(#p-glassTop)" opacity="0.4"/>
  </g>
  <g transform="rotate(-4.5 620 460)" opacity="0.76">
    <rect x="308" y="266" width="560" height="310" rx="30" fill="url(#p-glass)" stroke="#ffe9c7" stroke-opacity="0.22"/>
    <rect x="308" y="266" width="560" height="130" rx="30" fill="url(#p-glassTop)" opacity="0.45"/>
  </g>

  <!-- floor shadow of hero card -->
  <ellipse cx="640" cy="762" rx="330" ry="42" fill="#0c0405" opacity="0.65" filter="url(#p-soft)"/>

  <!-- hero glass card -->
  <g>
    <rect x="286" y="322" width="620" height="360" rx="34" fill="url(#p-glass)" stroke="#ffd9a0" stroke-opacity="0.5" stroke-width="1.6"/>
    <rect x="286" y="322" width="620" height="150" rx="34" fill="url(#p-glassTop)"/>

    <text x="338" y="398" font-family="'Cascadia Mono','Consolas',monospace" font-size="21" letter-spacing="4.5" fill="#fdba74" opacity="0.9">BALANCE DUE</text>
    <text x="332" y="500" font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="92" font-weight="700" fill="#fff5e6" letter-spacing="-2">$84.20</text>
    <g fill="#ffe9c7" opacity="0.35">
      <rect x="340" y="528" width="196" height="11" rx="5.5"/>
      <rect x="340" y="552" width="128" height="11" rx="5.5"/>
    </g>

    <!-- gold pay pill -->
    <g>
      <rect x="336" y="590" width="252" height="66" rx="33" fill="url(#p-gold)" filter="url(#p-glow)"/>
      <text x="392" y="633" font-family="'Segoe UI','Inter',system-ui,sans-serif" font-size="26" font-weight="700" fill="#2a1013">PAY NOW</text>
      <path d="M544 623 l16 0 m-7 -8 l8 8 l-8 8" stroke="#2a1013" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- tap ripples -->
    <g fill="none" stroke="#fde68a">
      <circle cx="462" cy="623" r="56" stroke-opacity="0.5" stroke-width="1.8"/>
      <circle cx="462" cy="623" r="88" stroke-opacity="0.26" stroke-width="1.5"/>
      <circle cx="462" cy="623" r="124" stroke-opacity="0.1" stroke-width="1.4"/>
    </g>

    <!-- status chip on card -->
    <g>
      <rect x="672" y="376" width="192" height="54" rx="27" fill="#fbbf24" fill-opacity="0.13" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1.4"/>
      <circle cx="704" cy="403" r="7" fill="#fcd34d" filter="url(#p-glow)"/>
      <text x="724" y="412" font-family="'Cascadia Mono','Consolas',monospace" font-size="20" letter-spacing="2.5" fill="#fde68a">AUTOPAY</text>
    </g>

    <!-- quick actions -->
    <g>
      <circle cx="706" cy="590" r="35" fill="#fb7185" fill-opacity="0.15" stroke="#fb7185" stroke-opacity="0.55" stroke-width="1.6"/>
      <path d="M692 590 h28 M706 576 v28" stroke="#fda4af" stroke-width="3.4" stroke-linecap="round"/>
      <circle cx="800" cy="590" r="35" fill="#fbbf24" fill-opacity="0.13" stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1.6"/>
      <path d="M786 592 l10 10 l20 -22" stroke="#fde68a" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- clock chip, floating free -->
  <g transform="rotate(6 1000 260)">
    <rect x="912" y="212" width="176" height="58" rx="29" fill="#1c0b0e" fill-opacity="0.88" stroke="#fb7185" stroke-opacity="0.5" stroke-width="1.4"/>
    <circle cx="944" cy="241" r="7" fill="#fb7185" filter="url(#p-glow)"/>
    <text x="964" y="251" font-family="'Cascadia Mono','Consolas',monospace" font-size="23" letter-spacing="2" fill="#fda4af">02:14 AM</text>
  </g>

  <rect width="1200" height="900" fill="url(#p-vign)"/>
  <rect width="1200" height="900" filter="url(#p-grain)" opacity="0.05"/>
</svg>
