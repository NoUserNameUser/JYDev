<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="A crystal prism refracting one beam of light into five branded beams, each ending in its own interface">
  <defs>
    <linearGradient id="b-sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0d0614"/>
      <stop offset="0.5" stop-color="#160a24"/>
      <stop offset="1" stop-color="#1f0d33"/>
    </linearGradient>
    <radialGradient id="b-nebula" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a21caf" stop-opacity="0.4"/>
      <stop offset="0.6" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b-inbeam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fdf4ff" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#fdf4ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="b-facet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b1a5c"/>
      <stop offset="0.45" stop-color="#241040"/>
      <stop offset="1" stop-color="#170a2a"/>
    </linearGradient>
    <linearGradient id="b-facet2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#581c87" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2a1148" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="b-r1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0abfc" stop-opacity="0.9"/><stop offset="1" stop-color="#f0abfc" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b-r2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e879f9" stop-opacity="0.9"/><stop offset="1" stop-color="#e879f9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b-r3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc" stop-opacity="0.9"/><stop offset="1" stop-color="#c084fc" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b-r4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.9"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="b-r5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.9"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0.06"/>
    </linearGradient>
    <radialGradient id="b-vign" cx="0.5" cy="0.46" r="0.76">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#08030e" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="b-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="b-soft" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="b-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#b-sky)"/>
  <ellipse cx="480" cy="450" rx="460" ry="380" fill="url(#b-nebula)"/>

  <!-- dust -->
  <g fill="#f5d0fe">
    <circle cx="180" cy="180" r="1.6" opacity="0.55"/><circle cx="960" cy="130" r="1.4" opacity="0.5"/>
    <circle cx="1100" cy="360" r="1.7" opacity="0.55"/><circle cx="150" cy="640" r="1.4" opacity="0.45"/>
    <circle cx="620" cy="120" r="1.3" opacity="0.4"/><circle cx="1060" cy="760" r="1.5" opacity="0.45"/>
    <circle cx="360" cy="750" r="1.3" opacity="0.4"/>
  </g>

  <!-- incoming beam -->
  <g>
    <rect x="0" y="440" width="360" height="30" fill="url(#b-inbeam)" filter="url(#b-soft)"/>
    <rect x="0" y="450" width="366" height="8" fill="url(#b-inbeam)"/>
  </g>

  <!-- refracted beams (drawn under prism) -->
  <g>
    <path d="M470 430 L1160 160 L1160 214 L474 452 Z" fill="url(#b-r1)" opacity="0.5"/>
    <path d="M474 444 L1170 320 L1170 356 L476 458 Z" fill="url(#b-r2)" opacity="0.55"/>
    <path d="M476 452 L1180 452 L1180 480 L476 470 Z" fill="url(#b-r3)" opacity="0.55"/>
    <path d="M476 460 L1170 580 L1170 616 L474 476 Z" fill="url(#b-r4)" opacity="0.55"/>
    <path d="M474 468 L1160 700 L1160 754 L470 486 Z" fill="url(#b-r5)" opacity="0.5"/>
  </g>
  <!-- beam core lines -->
  <g stroke-linecap="round" fill="none">
    <path d="M472 442 L1150 190" stroke="#f0abfc" stroke-width="2.2" opacity="0.85"/>
    <path d="M475 450 L1158 340" stroke="#e879f9" stroke-width="2.2" opacity="0.85"/>
    <path d="M477 458 L1166 464" stroke="#c084fc" stroke-width="2.4" opacity="0.9"/>
    <path d="M475 466 L1158 596" stroke="#a78bfa" stroke-width="2.2" opacity="0.85"/>
    <path d="M472 474 L1150 724" stroke="#8b5cf6" stroke-width="2.2" opacity="0.85"/>
  </g>
  <!-- dispersion sparks along beams -->
  <g>
    <circle cx="640" cy="378" r="2.8" fill="#f0abfc" opacity="0.9"/><circle cx="820" cy="312" r="2.2" fill="#f0abfc" opacity="0.7"/>
    <circle cx="700" cy="415" r="2.4" fill="#e879f9" opacity="0.85"/><circle cx="905" cy="382" r="2" fill="#e879f9" opacity="0.65"/>
    <circle cx="760" cy="460" r="2.8" fill="#c084fc" opacity="0.9"/><circle cx="950" cy="462" r="2.2" fill="#c084fc" opacity="0.7"/>
    <circle cx="705" cy="512" r="2.4" fill="#a78bfa" opacity="0.8"/><circle cx="900" cy="552" r="2" fill="#a78bfa" opacity="0.65"/>
    <circle cx="645" cy="538" r="2.6" fill="#8b5cf6" opacity="0.85"/><circle cx="815" cy="600" r="2.2" fill="#8b5cf6" opacity="0.7"/>
  </g>

  <!-- five brand chips at beam ends -->
  <g>
    <g transform="rotate(-6 1010 190)">
      <rect x="940" y="158" width="146" height="64" rx="12" fill="#1c0f2e" stroke="#f0abfc" stroke-opacity="0.7" stroke-width="1.4"/>
      <rect x="940" y="158" width="146" height="18" rx="9" fill="#f0abfc" fill-opacity="0.3"/>
      <circle cx="954" cy="167" r="3" fill="#f0abfc"/>
      <rect x="956" y="190" width="82" height="8" rx="4" fill="#f0abfc" fill-opacity="0.8"/>
      <rect x="956" y="204" width="56" height="6" rx="3" fill="#f5f1e8" fill-opacity="0.25"/>
    </g>
    <g transform="rotate(-3 1020 330)">
      <rect x="950" y="302" width="146" height="64" rx="12" fill="#1c0f2e" stroke="#e879f9" stroke-opacity="0.7" stroke-width="1.4"/>
      <rect x="950" y="302" width="146" height="18" rx="9" fill="#e879f9" fill-opacity="0.3"/>
      <circle cx="964" cy="311" r="3" fill="#e879f9"/>
      <rect x="966" y="334" width="74" height="8" rx="4" fill="#e879f9" fill-opacity="0.8"/>
      <rect x="966" y="348" width="94" height="6" rx="3" fill="#f5f1e8" fill-opacity="0.25"/>
    </g>
    <g>
      <rect x="964" y="428" width="150" height="66" rx="12" fill="#1c0f2e" stroke="#c084fc" stroke-opacity="0.8" stroke-width="1.6"/>
      <rect x="964" y="428" width="150" height="18" rx="9" fill="#c084fc" fill-opacity="0.32"/>
      <circle cx="978" cy="437" r="3" fill="#c084fc"/>
      <rect x="980" y="460" width="90" height="8" rx="4" fill="#c084fc" fill-opacity="0.85"/>
      <rect x="980" y="475" width="62" height="6" rx="3" fill="#f5f1e8" fill-opacity="0.28"/>
    </g>
    <g transform="rotate(3 1020 590)">
      <rect x="950" y="560" width="146" height="64" rx="12" fill="#1c0f2e" stroke="#a78bfa" stroke-opacity="0.7" stroke-width="1.4"/>
      <rect x="950" y="560" width="146" height="18" rx="9" fill="#a78bfa" fill-opacity="0.3"/>
      <circle cx="964" cy="569" r="3" fill="#a78bfa"/>
      <rect x="966" y="592" width="80" height="8" rx="4" fill="#a78bfa" fill-opacity="0.8"/>
      <rect x="966" y="606" width="52" height="6" rx="3" fill="#f5f1e8" fill-opacity="0.25"/>
    </g>
    <g transform="rotate(6 1010 700)">
      <rect x="940" y="672" width="146" height="64" rx="12" fill="#1c0f2e" stroke="#8b5cf6" stroke-opacity="0.7" stroke-width="1.4"/>
      <rect x="940" y="672" width="146" height="18" rx="9" fill="#8b5cf6" fill-opacity="0.32"/>
      <circle cx="954" cy="681" r="3" fill="#8b5cf6"/>
      <rect x="956" y="704" width="86" height="8" rx="4" fill="#8b5cf6" fill-opacity="0.85"/>
      <rect x="956" y="718" width="66" height="6" rx="3" fill="#f5f1e8" fill-opacity="0.25"/>
    </g>
  </g>

  <!-- the prism -->
  <g>
    <path d="M410 330 L500 458 L410 586 L346 458 Z" fill="url(#b-facet)" stroke="#f0abfc" stroke-opacity="0.55" stroke-width="1.6"/>
    <path d="M410 330 L500 458 L410 586 Z" fill="url(#b-facet2)" opacity="0.85"/>
    <path d="M410 330 L410 586 M346 458 L500 458" stroke="#f5d0fe" stroke-opacity="0.3" stroke-width="1"/>
    <!-- entry hotspot -->
    <circle cx="368" cy="456" r="7" fill="#ffffff" filter="url(#b-glow)"/>
    <!-- exit caustics -->
    <g filter="url(#b-glow)">
      <circle cx="486" cy="440" r="4.5" fill="#f0abfc"/>
      <circle cx="492" cy="458" r="5" fill="#e879f9"/>
      <circle cx="486" cy="476" r="4.5" fill="#a78bfa"/>
    </g>
    <!-- crown highlight -->
    <path d="M404 344 L418 344" stroke="#fdf4ff" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- label chip -->
  <g>
    <rect x="346" y="640" width="252" height="50" rx="25" fill="#120722" fill-opacity="0.85" stroke="#e879f9" stroke-opacity="0.45" stroke-width="1.3"/>
    <text x="376" y="673" font-family="'Cascadia Mono','Consolas',monospace" font-size="21" letter-spacing="3.5" fill="#f0abfc">1 CORE - 5 BRANDS</text>
  </g>

  <rect width="1200" height="900" fill="url(#b-vign)"/>
  <rect width="1200" height="900" filter="url(#b-grain)" opacity="0.05"/>
</svg>
